<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="#1d4ed8"/>
  <!-- Subtle sky gradient overlay -->
  <rect width="512" height="300" rx="0" fill="white" opacity="0.06"/>

  <!-- ── DELIVERY PERSON ── -->

  <!-- Body / blue polo shirt -->
  <path d="M 172 300 L 140 490 L 372 490 L 340 300 Q 308 278 256 274 Q 204 278 172 300 Z"
        fill="#3b82f6" stroke="#0f172a" stroke-width="9" stroke-linejoin="round"/>

  <!-- White polo collar V -->
  <path d="M 238 274 L 256 315 L 274 274" fill="white" stroke="#0f172a" stroke-width="7" stroke-linejoin="round"/>

  <!-- Neck -->
  <rect x="234" y="236" width="44" height="46" rx="6"
        fill="#f9a85d" stroke="#0f172a" stroke-width="8"/>

  <!-- Head (slightly tall oval for cartoon) -->
  <ellipse cx="256" cy="182" rx="74" ry="78"
           fill="#f9a85d" stroke="#0f172a" stroke-width="9"/>

  <!-- Ear left -->
  <ellipse cx="182" cy="193" rx="14" ry="19"
           fill="#f9a85d" stroke="#0f172a" stroke-width="8"/>
  <!-- Ear right -->
  <ellipse cx="330" cy="193" rx="14" ry="19"
           fill="#f9a85d" stroke="#0f172a" stroke-width="8"/>

  <!-- Cap crown (blue) -->
  <path d="M 187 165 Q 187 100 256 96 Q 325 100 325 165 Z"
        fill="#1e3a8a" stroke="#0f172a" stroke-width="9"/>
  <!-- Cap brim -->
  <path d="M 180 168 Q 256 186 332 168 L 332 182 Q 256 200 180 182 Z"
        fill="#1e3a8a" stroke="#0f172a" stroke-width="8"/>
  <!-- Cap center button -->
  <circle cx="256" cy="100" r="9" fill="#93c5fd"/>

  <!-- Eyes (big friendly cartoon eyes) -->
  <ellipse cx="228" cy="188" rx="13" ry="14" fill="#0f172a"/>
  <ellipse cx="284" cy="188" rx="13" ry="14" fill="#0f172a"/>
  <!-- Eye glint -->
  <circle cx="233" cy="183" r="5" fill="white"/>
  <circle cx="289" cy="183" r="5" fill="white"/>

  <!-- Eyebrows (friendly, slightly raised) -->
  <path d="M 215 170 Q 228 163 241 168" stroke="#0f172a" stroke-width="7"
        fill="none" stroke-linecap="round"/>
  <path d="M 271 168 Q 284 163 297 170" stroke="#0f172a" stroke-width="7"
        fill="none" stroke-linecap="round"/>

  <!-- Nose (small round) -->
  <ellipse cx="256" cy="207" rx="7" ry="5" fill="#e07c3a"/>

  <!-- Happy smile -->
  <path d="M 230 220 Q 256 244 282 220" stroke="#0f172a" stroke-width="8"
        fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M 234 222 Q 256 240 278 222 Q 256 233 234 222 Z" fill="white"/>

  <!-- Cheek blush (comic style) -->
  <ellipse cx="208" cy="210" rx="19" ry="11" fill="#f87171" opacity="0.45"/>
  <ellipse cx="304" cy="210" rx="19" ry="11" fill="#f87171" opacity="0.45"/>

  <!-- ── ARMS (holding box below) ── -->

  <!-- Left arm -->
  <path d="M 172 360 Q 140 375 132 410 L 158 422 Q 162 395 178 378 L 195 368 Z"
        fill="#f9a85d" stroke="#0f172a" stroke-width="8" stroke-linejoin="round"/>

  <!-- Right arm -->
  <path d="M 340 360 Q 372 375 380 410 L 354 422 Q 350 395 334 378 L 317 368 Z"
        fill="#f9a85d" stroke="#0f172a" stroke-width="8" stroke-linejoin="round"/>

  <!-- ── CARDBOARD BOX ── -->

  <!-- Box main face -->
  <rect x="152" y="358" width="208" height="148" rx="9"
        fill="#d97706" stroke="#0f172a" stroke-width="9"/>

  <!-- Box top flap (lighter) -->
  <rect x="152" y="354" width="208" height="34" rx="6"
        fill="#fbbf24" stroke="#0f172a" stroke-width="9"/>

  <!-- Tape cross (yellow) — vertical -->
  <rect x="246" y="354" width="20" height="152" rx="3"
        fill="#fde68a" stroke="#0f172a" stroke-width="5"/>
  <!-- Tape cross (yellow) — horizontal -->
  <rect x="152" y="420" width="208" height="20" rx="3"
        fill="#fde68a" stroke="#0f172a" stroke-width="5"/>

  <!-- Small shipping label on box -->
  <rect x="175" y="445" width="75" height="45" rx="5"
        fill="white" stroke="#0f172a" stroke-width="5"/>
  <!-- Label lines -->
  <line x1="183" y1="458" x2="241" y2="458" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <line x1="183" y1="470" x2="235" y2="470" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <line x1="183" y1="482" x2="228" y2="482" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
</svg>
